<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化回测系统 - 登录</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .auth-title {
            text-align: center;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 30px;
        }
        .tab-group {
            display: flex;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: rgba(99,102,241,0.8);
            color: #fff;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }
        .form-group input:focus { border-color: rgba(99,102,241,0.6); }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(99,102,241,0.4);
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .form-hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-title">量化回测系统</div>
        <div class="auth-subtitle">专业的量化交易策略分析平台</div>

        <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('login')">登录</button>
            <button class="tab-btn" onclick="switchTab('register')">注册</button>
        </div>

        <div id="login-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="login-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="login-password" placeholder="请输入密码">
            </div>
            <button class="btn-primary" onclick="doLogin()">登录</button>
            <div class="error-msg" id="login-error"></div>
        </div>

        <div id="register-form" class="form-hidden">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="register-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="register-password" placeholder="请输入密码">
            </div>
            <button class="btn-primary" onclick="doRegister()">注册</button>
            <div class="error-msg" id="register-error"></div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('login-form').classList.toggle('form-hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('form-hidden', tab !== 'register');
            event.target.classList.add('active');
        }

        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errEl = document.getElementById('login-error');
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.username);
                    window.location.href = '/dashboard';
                } else {
                    errEl.textContent = data.detail || '登录失败';
                    errEl.style.display = 'block';
                }
            } catch(e) {
                errEl.textContent = '网络错误';
                errEl.style.display = 'block';
            }
        }

        async function doRegister() {
            const username = document.getElementById('register-username').value.trim();
            const password = document.getElementById('register-password').value;
            const errEl = document.getElementById('register-error');
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.username);
                    window.location.href = '/dashboard';
                } else {
                    errEl.textContent = data.detail || '注册失败';
                    errEl.style.display = 'block';
                }
            } catch(e) {
                errEl.textContent = '网络错误';
                errEl.style.display = 'block';
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const loginHidden = document.getElementById('login-form').classList.contains('form-hidden');
                if (!loginHidden) doLogin();
                else doRegister();
            }
        });
    </script>
</body>
</html>
