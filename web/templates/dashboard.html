<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化回测系统 - 仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 220px;
            background: rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 20px 0;
        }
        .sidebar-brand {
            padding: 0 20px 20px;
            font-size: 18px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
        }
        .sidebar-brand span { color: #6366f1; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .nav-item:hover, .nav-item.active {
            color: #fff;
            background: rgba(99,102,241,0.1);
        }
        .nav-item.active { border-right: 3px solid #6366f1; }
        .nav-item .icon { margin-right: 10px; font-size: 18px; }
        .main {
            margin-left: 220px;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 24px; }
        .user-info {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .user-info button {
            margin-left: 12px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
        }
        .card-label { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 8px; }
        .card-value {
            font-size: 28px;
            font-weight: 700;
        }
        .card-value.positive { color: #22c55e; }
        .card-value.negative { color: #ef4444; }
        .card-sub { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 4px; }
        .chart-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .chart-container h3 { margin-bottom: 16px; font-size: 16px; }
        .chart-container canvas { max-height: 350px; }
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }
        .results-table th, .results-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 13px;
        }
        .results-table th { color: rgba(255,255,255,0.5); font-weight: 500; }
        .results-table td { color: rgba(255,255,255,0.8); }
        .badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .badge.dual_ma { background: rgba(99,102,241,0.2); color: #818cf8; }
        .badge.rsi { background: rgba(34,197,94,0.2); color: #4ade80; }
        .badge.macd { background: rgba(234,179,8,0.2); color: #facc15; }
        .badge.bollinger { background: rgba(239,68,68,0.2); color: #f87171; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">📊 <span>量化</span>回测</div>
        <a class="nav-item active" href="/dashboard"><span class="icon">📈</span> 仪表盘</a>
        <a class="nav-item" href="/backtest"><span class="icon">🔄</span> 回测分析</a>
        <a class="nav-item" href="/results"><span class="icon">📋</span> 历史结果</a>
        <a class="nav-item" href="/strategies"><span class="icon">⚙️</span> 策略管理</a>
        <hr style="border-color: rgba(255,255,255,0.06); margin: 20px;">
        <div class="nav-item" onclick="logout()"><span class="icon">🚪</span> 退出</div>
    </nav>

    <div class="main">
        <div class="header">
            <h1>仪表盘</h1>
            <div class="user-info">
                <span id="username-display"></span>
                <button onclick="window.location.href='/backtest'">新建回测</button>
            </div>
        </div>

        <div class="card-grid">
            <div class="card">
                <div class="card-label">总回测次数</div>
                <div class="card-value" id="total-backtests">-</div>
            </div>
            <div class="card">
                <div class="card-label">平均收益率</div>
                <div class="card-value" id="avg-return">-</div>
                <div class="card-sub">所有策略平均</div>
            </div>
            <div class="card">
                <div class="card-label">最好策略</div>
                <div class="card-value" id="best-strategy">-</div>
                <div class="card-sub" id="best-strategy-return"></div>
            </div>
            <div class="card">
                <div class="card-label">平均夏普比率</div>
                <div class="card-value" id="avg-sharpe">-</div>
            </div>
        </div>

        <div class="chart-container">
            <h3>📊 策略表现对比</h3>
            <canvas id="compareChart"></canvas>
        </div>

        <div class="chart-container">
            <h3>🕐 最近回测结果</h3>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>策略</th>
                        <th>标的</th>
                        <th>收益率</th>
                        <th>年化收益率</th>
                        <th>最大回撤</th>
                        <th>夏普比率</th>
                        <th>交易次数</th>
                        <th>胜率</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="recent-results"></tbody>
            </table>
            <p style="text-align:center; color: rgba(255,255,255,0.3); margin-top: 20px; font-size: 13px;" id="no-results">暂无回测数据，去 <a href="/backtest" style="color:#6366f1;">新建回测</a></p>
        </div>
    </div>

    <script>
        const API = '';
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; }

        document.getElementById('username-display').textContent = '👤 ' + (localStorage.getItem('username') || '');

        async function api(path, options = {}) {
            const res = await fetch(API + path, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token,
                    ...options.headers
                }
            });
            if (res.status === 401) { localStorage.clear(); window.location.href = '/login'; }
            return res.json();
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        function fmtPct(v) { return (v * 100).toFixed(2) + '%'; }
        function fmtNum(v) { return typeof v === 'number' ? v.toFixed(2) : v; }

        function badgeClass(type) {
            const m = {dual_ma:'dual_ma', rsi:'rsi', macd:'macd', bollinger:'bollinger'};
            return m[type] || '';
        }
        function strategyName(type) {
            const m = {dual_ma:'双均线', rsi:'RSI', macd:'MACD', bollinger:'布林带'};
            return m[type] || type;
        }

        async function loadDashboard() {
            const data = await api('/api/backtest/results');
            const results = data.results || [];

            document.getElementById('total-backtests').textContent = results.length;

            if (results.length === 0) {
                document.getElementById('no-results').style.display = 'block';
                document.getElementById('recent-results').innerHTML = '';
                return;
            }

            document.getElementById('no-results').style.display = 'none';

            // Stats
            const returns = results.map(r => r.total_return);
            const avgRet = returns.reduce((a,b) => a+b, 0) / results.length;
            document.getElementById('avg-return').textContent = fmtPct(avgRet);
            document.getElementById('avg-return').className = 'card-value' + (avgRet >= 0 ? ' positive' : ' negative');

            const sharps = results.map(r => r.sharpe_ratio);
            const avgSharpe = sharps.reduce((a,b) => a+b, 0) / results.length;
            document.getElementById('avg-sharpe').textContent = avgSharpe.toFixed(2);

            // Best
            const best = results.reduce((a,b) => a.total_return > b.total_return ? a : b);
            document.getElementById('best-strategy').textContent = strategyName(best.strategy_type);
            document.getElementById('best-strategy-return').textContent = '收益率: ' + fmtPct(best.total_return);

            // Recent
            const tbody = document.getElementById('recent-results');
            tbody.innerHTML = results.slice(0, 10).map(r => `
                <tr>
                    <td><span class="badge ${badgeClass(r.strategy_type)}">${strategyName(r.strategy_type)}</span></td>
                    <td>${r.symbol}</td>
                    <td style="color: ${r.total_return >= 0 ? '#22c55e' : '#ef4444'}">${fmtPct(r.total_return)}</td>
                    <td>${fmtPct(r.annual_return)}</td>
                    <td>${fmtPct(r.max_drawdown)}</td>
                    <td>${fmtNum(r.sharpe_ratio)}</td>
                    <td>${r.total_trades}</td>
                    <td>${fmtPct(r.win_rate)}</td>
                    <td style="font-size:12px; color:rgba(255,255,255,0.4)">${r.created_at ? r.created_at.slice(0,10) : ''}</td>
                </tr>
            `).join('');

            // Chart
            const labels = results.map(r => strategyName(r.strategy_type));
            const retData = results.map(r => r.total_return * 100);
            const sharpData = results.map(r => r.sharpe_ratio);

            new Chart(document.getElementById('compareChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '收益率 (%)',
                            data: retData,
                            backgroundColor: 'rgba(99,102,241,0.6)',
                            borderColor: 'rgba(99,102,241,1)',
                            borderWidth: 1,
                            yAxisID: 'y'
                        },
                        {
                            label: '夏普比率',
                            data: sharpData,
                            backgroundColor: 'rgba(34,197,94,0.4)',
                            borderColor: 'rgba(34,197,94,1)',
                            borderWidth: 1,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: { color: 'rgba(255,255,255,0.7)' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.5)' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            type: 'linear',
                            position: 'left',
                            ticks: { color: 'rgba(255,255,255,0.5)', callback: v => v + '%' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            ticks: { color: 'rgba(255,255,255,0.5)' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        loadDashboard();
    </script>
</body>
</html>
